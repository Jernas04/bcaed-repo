<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="audioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="120" height="120" fill="white" rx="12"/>
  <!-- Microphone circle -->
  <circle cx="60" cy="60" r="40" fill="none" stroke="url(#audioGrad)" stroke-width="3"/>
  <!-- Microphone stand -->
  <rect x="57" y="85" width="6" height="20" fill="url(#audioGrad)" rx="3"/>
  <!-- Sound waves -->
  <path d="M 35 60 Q 40 50 45 60" fill="none" stroke="#667eea" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 75 60 Q 80 50 85 60" fill="none" stroke="#764ba2" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Microphone head -->
  <circle cx="60" cy="45" r="12" fill="url(#audioGrad)"/>
</svg>